<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nancy Drew: Тень Восточного Экспресса</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game">
      <header class="hero">
        <h1>Nancy Drew: Тень Восточного Экспресса</h1>
        <p>
          Детективное приключение, вдохновлённое классическими железнодорожными тайнами и духом
          головоломок из серий Nancy Drew.
        </p>
      </header>

      <section id="story" class="card"></section>

      <section id="puzzle" class="card hidden"></section>

      <section id="controls" class="controls">
        <button id="nextBtn" class="btn" disabled>Дальше</button>
        <button id="restartBtn" class="btn secondary">Начать заново</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
